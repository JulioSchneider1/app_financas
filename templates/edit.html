<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5" style="max-width: 500px;">
  <h2 class="mb-4">Editar Lançamento</h2>

  <form method="POST" class="card p-4 shadow">

    <input name="descricao" class="form-control mb-3" value="{{ lanc.descricao }}">

    <input name="valor" type="number" step="0.01" class="form-control mb-3" value="{{ lanc.valor }}">

    <select name="tipo" class="form-select mb-3">
      <option value="R" {% if lanc.tipo == 'R' %}selected{% endif %}>Receita</option>
      <option value="D" {% if lanc.tipo == 'D' %}selected{% endif %}>Despesa</option>
    </select>

    <button class="btn btn-primary">Salvar</button>
  </form>
</div>
