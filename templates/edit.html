<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Editar Lançamento</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width: 600px;">

  <div class="card shadow">
    <div class="card-body">

      <h3 class="mb-4 text-center">Editar Lançamento</h3>

      <form method="POST" class="row g-3">

        <div class="col-12">
          <label class="form-label">Descrição</label>
          <input name="descricao" class="form-control" value="{{ lanc.descricao }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Valor</label>
          <input name="valor" type="number" step="0.01" class="form-control" value="{{ lanc.valor }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Tipo</label>
          <select name="tipo" class="form-select">
            <option value="R" {% if lanc.tipo == 'R' %}selected{% endif %}>Receita</option>
            <option value="D" {% if lanc.tipo == 'D' %}selected{% endif %}>Despesa</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Data</label>
          <input 
            type="date" 
            name="data" 
            class="form-control"
            value="{{ lanc.data.strftime('%Y-%m-%d') if lanc.data else '' }}"
          >
        </div>
        <div class="col-md-6 d-flex align-items-end">
          <div class="form-check">
            <input 
              class="form-check-input" 
              type="checkbox" 
              name="status"
              {% if lanc.status %}checked{% endif %}
            >
            <label class="form-check-label">
              Lançamento efetuado
            </label>
          </div>
        </div>
        <div class="col-12 d-flex justify-content-between mt-3">

          <a href="/dashboard" class="btn btn-secondary">
            ← Voltar
          </a>

          <button class="btn btn-primary">
            💾 Salvar
          </button>

        </div>

      </form>

    </div>
  </div>
</div>
</body>
</html>
