name: Tests

on:
  workflow_run:
    workflows: ["Code Quality"]
    types:
      - completed

jobs:
  tests:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - run: pip install -r requirements.txt
      - run: pytest